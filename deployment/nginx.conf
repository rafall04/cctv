# RAF NET CCTV - Nginx Configuration (RAM MODE)
# ==============================================
#
# Architecture:
# - Frontend: cctv.raf.my.id (serves React SPA)
# - Backend API: api-cctv.raf.my.id (Fastify API + HLS/WebRTC proxy)
#
# Stream Flow (RAM OPTIMIZED):
# 1. Frontend requests /hls/camera1/index.m3u8 from api-cctv.raf.my.id
# 2. Nginx proxies to MediaMTX at localhost:8888
# 3. MediaMTX serves HLS from /dev/shm (RAM disk - zero disk I/O)
# 4. Nginx caches in /dev/shm/nginx-cache (RAM cache)
#
# This keeps MediaMTX internal and not exposed to the internet
# NOTE: Using port 800 because port 80 is used by aaPanel

# ===================================
# RAM CACHE CONFIGURATION
# ===================================
proxy_cache_path /dev/shm/nginx-cache
    levels=1:2
    keys_zone=hls_cache:10m
    max_size=200m
    inactive=10m
    use_temp_path=off;

# ===================================
# SECURITY: Block MediaMTX Management API
# ===================================
server {
    listen 800;
    listen [::]:800;

    server_name mediamtx.raf.my.id mtx.raf.my.id api.mediamtx.raf.my.id;

    location / {
        deny all;
        return 403 "MediaMTX API access forbidden";
    }

    access_log /var/log/nginx/mediamtx-blocked.access.log;
    error_log /var/log/nginx/mediamtx-blocked.error.log;
}

# ===================================
# Frontend Application Server
# ===================================
server {
    listen 800;
    listen [::]:800;

    server_name cctv.raf.my.id 172.17.11.12;

    root /var/www/rafnet-cctv/frontend/dist;
    index index.html;
    client_max_body_size 10M;

    # ===================================
    # SECURITY: Block Access to Sensitive Files
    # ===================================
    location ~ /\.env { deny all; return 404; }
    location ~ /\.git { deny all; return 404; }
    location ~ \.(bak|backup|old|orig|save|swp|swo|tmp)$ { deny all; return 404; }
    location ~ /(config|configuration)\.(php|js|json|yml|yaml)\.bak$ { deny all; return 404; }
    location ~ \.(sql|db|sqlite|sqlite3)$ { deny all; return 404; }
    location ~ /\.ht { deny all; return 404; }
    location ~ /\. { deny all; return 404; }
    location ~ /node_modules/ { deny all; return 404; }
    location ~ /(package\.json|package-lock\.json|yarn\.lock|composer\.json|composer\.lock)$ { deny all; return 404; }

    # ===================================
    # SECURITY HEADERS
    # ===================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location = /robots.txt {
        try_files $uri =404;
        add_header Content-Type text/plain;
    }

    location = /sitemap.xml {
        try_files $uri =404;
        add_header Content-Type application/xml;
    }

    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    # ===================================
    # Recording Playback Proxy
    # ===================================
    location ^~ /api/recordings/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        proxy_buffer_size 128k;
        proxy_buffers 8 128k;
        proxy_busy_buffers_size 256k;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 0;
    }

    # ===================================
    # Thumbnail API Proxy
    # ===================================
    # Must bypass regex static assets like *.jpg
    location ^~ /api/thumbnails/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===================================
    # Backend API Proxy
    # ===================================
    location ^~ /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===================================
    # HLS Stream Proxy
    # ===================================
    location ^~ /hls/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache hls_cache;
        proxy_cache_valid 200 2s;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        proxy_cache_key "$scheme$proxy_host$request_uri";
        add_header X-Cache-Status $upstream_cache_status;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/rafnet-cctv-frontend.access.log;
    error_log /var/log/nginx/rafnet-cctv-frontend.error.log;
}

# ===================================
# Backend API Reverse Proxy
# ===================================
server {
    listen 800;
    listen [::]:800;

    server_name api-cctv.raf.my.id;

    client_max_body_size 10M;

    # ===================================
    # SECURITY: Block Access to Sensitive Files
    # ===================================
    location ~ /\.env { deny all; return 404; }
    location ~ /\.git { deny all; return 404; }
    location ~ \.(bak|backup|old|orig|save|swp|swo|tmp)$ { deny all; return 404; }
    location ~ /(config|configuration)\.(php|js|json|yml|yaml)\.bak$ { deny all; return 404; }
    location ~ \.(sql|db|sqlite|sqlite3)$ { deny all; return 404; }
    location ~ /\.ht { deny all; return 404; }
    location ~ /\. { deny all; return 404; }
    location ~ /node_modules/ { deny all; return 404; }
    location ~ /(package\.json|package-lock\.json|yarn\.lock|composer\.json|composer\.lock)$ { deny all; return 404; }
    location ~ /(src|tests|spec|\.vscode|\.idea)/ { deny all; return 404; }

    # ===================================
    # SECURITY HEADERS
    # ===================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location ^~ /hls/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache hls_cache;
        proxy_cache_valid 200 2s;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        proxy_cache_key "$scheme$proxy_host$request_uri";
        add_header X-Cache-Status $upstream_cache_status;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ^~ /webrtc/ {
        rewrite ^/webrtc/(.*)$ /$1 break;
        proxy_pass http://localhost:8889;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /api/recordings/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        proxy_buffer_size 128k;
        proxy_buffers 8 128k;
        proxy_busy_buffers_size 256k;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 0;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/rafnet-cctv-backend.access.log;
    error_log /var/log/nginx/rafnet-cctv-backend.error.log;
}
