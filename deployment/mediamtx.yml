# MediaMTX Configuration for RAF NET CCTV Production
# ===================================================
# RAM MODE: HLS segments written to /dev/shm for zero disk I/O latency
# Recording: Handled separately by recordingService.js (writes to disk)

# Logging
logLevel: info
logDestinations: [stdout]

# API for backend management
api: yes
apiAddress: :9997

# HLS settings - OPTIMIZED FOR RAM DISK
hls: yes
hlsAddress: :8888
# NO: let per-path sourceOnDemand close idle on_demand cameras; always_on kept warm by backend streamWarmer.
hlsAlwaysRemux: no
hlsAllowOrigin: '*'

# CRITICAL: Write HLS segments to RAM disk (/dev/shm)
# This eliminates disk I/O bottleneck for live streaming
hlsDirectory: /dev/shm/mediamtx-live

# CRITICAL: set hlsVariant EXPLICITLY. MediaMTX's DEFAULT is `lowLatency`, so
# commenting the line out does NOT disable LL-HLS — it silently runs it (0.25s
# parts + blocking reloads + ~0.6s hold-back), which collapses on lossy/high-RTT
# mobile links (e.g. Telkomsel -> Cloudflare SIN). `fmp4` = regular (non-LL) fMP4
# segments, also REQUIRED for HEVC/H.265 over HLS.
hlsVariant: fmp4

# Segment settings - 2s target (actual = max(2s, camera keyframe interval))
hlsSegmentDuration: 2s
# 10 segments (~20s window) gives the client room to ride out packet-loss bursts
hlsSegmentCount: 10
hlsSegmentMaxSize: 50M

# Write queue size - increased for better throughput
writeQueueSize: 512

# WebRTC settings
webrtc: yes
webrtcAddress: :8889
webrtcAllowOrigin: '*'

# RTMP settings
rtmp: yes
rtmpAddress: :1935

# RTSP settings
rtsp: yes
rtspAddress: :8554

# Path configurations managed by backend
paths:
  all_others: {}
