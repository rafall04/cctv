# MediaMTX Configuration for RAF NET CCTV Production

# Logging
logLevel: info
logDestinations: [stdout]

# API for backend management.
# Bound to LOOPBACK ONLY. This control API is AUTHLESS — anyone who can reach it
# reads /v3/config/paths/list, which contains every camera's RTSP source URL WITH
# embedded admin credentials, and can mutate paths. The box sits on a shared LAN
# (172.17.11.0/24, alongside other tenants), so `:9997` (= 0.0.0.0) exposed those
# credentials to the whole LAN. The backend reaches it via http://localhost:9997,
# so 127.0.0.1 loses nothing. Same reasoning applies to every address below.
api: yes
apiAddress: 127.0.0.1:9997

# HLS settings - OPTIMIZED MODE (Stability + Memory Efficiency)
hls: yes
# Loopback only: viewers reach HLS through nginx → backend /hls proxy (which enforces
# canViewLive + the community anti-hotlink gate). A directly-reachable :8888 on the LAN
# bypassed all of that. Backend/nginx use localhost, so nothing legitimate breaks.
hlsAddress: 127.0.0.1:8888
# NO (not yes): let per-path sourceOnDemand actually take effect — idle on_demand cameras
# (public / Surabaya) close instead of being remuxed 24/7. always_on (local/priority) cameras are
# kept muxer-warm by the backend streamWarmer (periodic HLS pings) for instant first-viewer TTFF,
# so this does NOT slow them down. Recording is unaffected: it pulls RTSP/HTTP directly (its own
# ffmpeg -i), never MediaMTX HLS — see backend/services/recordingStarter.js.
hlsAlwaysRemux: no
hlsAllowOrigin: '*'
# CRITICAL: MediaMTX's DEFAULT hlsVariant is `lowLatency`. Leaving this key unset
# (or merely commenting it out) does NOT disable LL-HLS — MediaMTX silently runs
# Low-Latency HLS (0.25s parts + blocking playlist reloads + ~0.6s hold-back).
# That mode collapses on high-latency / lossy mobile links: e.g. Telkomsel routes
# this zone to the Cloudflare Singapore (SIN) PoP over a lossy peering leg, so the
# client cannot keep the sub-second request cadence -> permanent rebuffering, while
# fixed-line ISPs (CGK PoP, clean path) play fine. `fmp4` = regular (non-LL) fMP4
# segments and is also REQUIRED for HEVC/H.265 over HLS (our cameras are HEVC).
# Must be set EXPLICITLY — do not rely on commenting `lowLatency` out.
hlsVariant: fmp4
# Segment duration: 2s (sweet spot for stability + reasonable latency).
# NOTE: actual segment length is max(this, camera GOP/keyframe interval); a camera
# with a 4s keyframe interval still yields ~4s segments. Lower the camera's I-frame
# interval if you want shorter, more loss-resilient segments.
hlsSegmentDuration: 2s
# Segment count: 10 (~20s playlist window) — enough history for the client to keep
# a buffer cushion and recover from packet-loss bursts on weak connections.
hlsSegmentCount: 10
# RAM Disk storage for instant access
hlsDirectory: /dev/shm/mediamtx-live

# WebRTC settings — loopback only (nginx /webrtc is closed with 403 anyway; player is HLS-only).
webrtc: yes
webrtcAddress: 127.0.0.1:8889
webrtcAllowOrigin: '*'

# RTMP settings — loopback only. Unused (all 100 cameras are pull rtspSource); no LAN ingest.
rtmp: yes
rtmpAddress: 127.0.0.1:1935

# RTSP settings — loopback only. MediaMTX PULLS from cameras (outbound rtspSource); the :8554
# ingest server is not used by any LAN client, so exposing it on the LAN was pure attack surface.
rtsp: yes
rtspAddress: 127.0.0.1:8554

# Path configurations managed by backend
# Default path settings (applied to all camera paths)
paths:
  all_others:
    # Default settings for paths without explicit config
    # Note: sourceOnDemand settings are applied per-path by backend API
    # when adding camera paths with RTSP sources
